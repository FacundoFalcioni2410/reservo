services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reservo
      POSTGRES_PASSWORD: reservo
      POSTGRES_DB: reservo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservo -d reservo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://reservo:reservo@db:5432/reservo?schema=public
    ports:
      - "3000:3000"

volumes:
  postgres_data:
